<!DOCTYPE html>
<html>
<head>
    <title>Yala Taxi - Client</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }
        button {
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h2>🚖 Yala Taxi (Client)</h2>

<input type="text" id="nom" placeholder="Votre nom">
<input type="text" id="phone" placeholder="WhatsApp">

<button onclick="getLocation()">Envoyer ma position</button>

<p id="status"></p>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(sendPosition);
    } else {
        alert("GPS non supporté");
    }
}

function sendPosition(position) {
    const data = {
        nom: document.getElementById("nom").value,
        phone: document.getElementById("phone").value,
        lat: position.coords.latitude,
        lng: position.coords.longitude
    };

    fetch("https://yala-taxi.onrender.com/api/client", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerText = "Position envoyée ✅";
    });
}
</script>

</body>
</html>
